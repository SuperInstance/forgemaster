<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena Chat</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e1e4eb;
    --text-dim: #888ea0;
    --accent: #6c8cff;
    --accent-dim: #4a6adf;
    --user-msg: #2a3a6a;
    --assistant-msg: #1f2233;
    --green: #4ade80;
    --red: #f87171;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    margin-right: auto;
  }
  header label { font-size: 13px; color: var(--text-dim); }
  select {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 10px;
    font-size: 13px;
    cursor: pointer;
  }
  button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: background .2s;
  }
  button:hover { background: var(--accent-dim); }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .clear-btn { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
  .clear-btn:hover { background: var(--border); border-color: var(--text-dim); }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .message {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: var(--radius);
    line-height: 1.5;
    font-size: 14px;
    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .message.user {
    align-self: flex-end;
    background: var(--user-msg);
    border-bottom-right-radius: 2px;
  }
  .message.assistant {
    align-self: flex-start;
    background: var(--assistant-msg);
    border-bottom-left-radius: 2px;
  }
  .message .role {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .message .role.user-role { color: var(--green); }
  .message .content { white-space: pre-wrap; word-break: break-word; }
  .message .content p { margin: 4px 0; }
  .streaming-indicator {
    display: inline-block;
    width: 8px;
    height: 16px;
    background: var(--accent);
    animation: blink .8s step-end infinite;
    margin-left: 2px;
    vertical-align: middle;
  }
  @keyframes blink { 50% { opacity: 0; } }
  #input-area {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  textarea {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    min-height: 42px;
    max-height: 120px;
    outline: none;
    transition: border-color .2s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text-dim); }
  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
    padding: 0 20px 8px;
  }
  .status .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    display: inline-block;
  }
  .dot.online { background: var(--green); }
  .dot.streaming { background: var(--accent); animation: blink .6s step-end infinite; }
  .dot.offline { background: var(--red); }
  .welcome {
    text-align: center;
    color: var(--text-dim);
    margin: auto;
    font-size: 14px;
  }
  .welcome h2 { font-size: 20px; color: var(--text); margin-bottom: 8px; }
  pre, code {
    background: rgba(0,0,0,.3);
    border-radius: 4px;
    padding: 2px 5px;
    font-size: 13px;
  }
  pre { padding: 10px; overflow-x: auto; margin: 6px 0; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>⚡ Arena Chat</h1>
  <label for="model">Model:</label>
  <select id="model">
    <option value="gpt-4o">GPT-4o</option>
    <option value="gpt-4o-mini">GPT-4o Mini</option>
    <option value="claude-3-opus">Claude 3 Opus</option>
    <option value="claude-3-sonnet" selected>Claude 3 Sonnet</option>
    <option value="gemini-pro">Gemini Pro</option>
    <option value="llama-3.1-70b">Llama 3.1 70B</option>
    <option value="mixtral-8x7b">Mixtral 8x7B</option>
  </select>
  <button id="stop-btn" style="display:none">⏹ Stop</button>
  <button class="clear-btn" id="clear-btn">✕ Clear</button>
</header>

<div id="chat">
  <div class="welcome">
    <h2>Arena Chat</h2>
    <p>Select a model and start chatting. Responses stream in real-time.</p>
  </div>
</div>

<div class="status" id="status-bar">
  <span class="dot online" id="status-dot"></span>
  <span id="status-text">Ready</span>
</div>

<div id="input-area">
  <textarea id="input" placeholder="Type a message..." rows="1"></textarea>
  <button id="send-btn">Send</button>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const stopBtn = document.getElementById('stop-btn');
const clearBtn = document.getElementById('clear-btn');
const modelSelect = document.getElementById('model');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');

let abortController = null;
let currentAssistantMsg = null;
let conversation = [];

function setStatus(type, text) {
  statusDot.className = 'dot ' + type;
  statusText.textContent = text;
}

function addMessage(role, content) {
  const div = document.createElement('div');
  div.className = 'message ' + role;
  div.innerHTML = '<div class="role ' + (role === 'user' ? 'user-role' : '') + '">' + role + '</div><div class="content">' + escapeHtml(content) + '</div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addStreamingMessage() {
  const div = document.createElement('div');
  div.className = 'message assistant';
  div.innerHTML = '<div class="role">assistant</div><div class="content"><span class="streaming-indicator"></span></div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function appendStreamingText(text) {
  const last = chat.lastElementChild;
  if (last && last.classList.contains('assistant')) {
    const contentDiv = last.querySelector('.content');
    let existing = contentDiv.textContent;
    if (existing.endsWith('█')) existing = existing.slice(0, -1);
    contentDiv.textContent = existing + text + '█';
    chat.scrollTop = chat.scrollHeight;
  }
}

function finalizeStreaming() {
  const last = chat.lastElementChild;
  if (last && last.classList.contains('assistant')) {
    const contentDiv = last.querySelector('.content');
    contentDiv.textContent = contentDiv.textContent.replace(/█$/, '');
  }
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function updateButtons(streaming) {
  sendBtn.disabled = streaming;
  sendBtn.textContent = streaming ? '...' : 'Send';
  stopBtn.style.display = streaming ? '' : 'none';
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || sendBtn.disabled) return;

  input.value = '';
  input.style.height = 'auto';

  const welcome = chat.querySelector('.welcome');
  if (welcome) welcome.remove();

  addMessage('user', text);
  conversation.push({ role: 'user', content: text });

  abortController = new AbortController();
  updateButtons(true);
  setStatus('streaming', 'Streaming...');

  const model = modelSelect.value;
  let fullResponse = '';
  currentAssistantMsg = addStreamingMessage();

  try {
    const response = await fetch('/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: model,
        messages: conversation,
        stream: true
      }),
      signal: abortController.signal
    });

    if (!response.ok) {
      const errText = await response.text().catch(() => 'Unknown error');
      throw new Error(`HTTP ${response.status}: ${errText}`);
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const data = line.slice(6).trim();
          if (data === '[DONE]') continue;
          try {
            const parsed = JSON.parse(data);
            const delta = parsed.choices?.[0]?.delta?.content || '';
            if (delta) {
              fullResponse += delta;
              appendStreamingText(fullResponse);
            }
          } catch (e) { /* skip */ }
        }
      }
    }

    finalizeStreaming();
    conversation.push({ role: 'assistant', content: fullResponse });
    setStatus('online', 'Ready');
  } catch (err) {
    if (err.name === 'AbortError') {
      finalizeStreaming();
      conversation.push({ role: 'assistant', content: fullResponse + '\n\n[Stopped]' });
      setStatus('online', 'Stopped');
    } else {
      finalizeStreaming();
      const errMsg = addMessage('assistant', 'Error: ' + err.message);
      setStatus('offline', 'Error: ' + err.message);
    }
  } finally {
    updateButtons(false);
    abortController = null;
  }
}

stopBtn.addEventListener('click', () => {
  if (abortController) {
    abortController.abort();
    abortController = null;
  }
});

clearBtn.addEventListener('click', () => {
  if (abortController) abortController.abort();
  chat.querySelectorAll('.message').forEach(m => m.remove());
  conversation = [];
  const div = document.createElement('div');
  div.className = 'welcome';
  div.innerHTML = '<h2>Arena Chat</h2><p>Select a model and start chatting. Responses stream in real-time.</p>';
  chat.appendChild(div);
  setStatus('online', 'Ready');
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

document.addEventListener('DOMContentLoaded', () => {
  input.focus();
});
</script>
</body>
</html>
