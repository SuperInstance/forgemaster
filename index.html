<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cocapn — Constraint Theory Universe</title>
<link rel="stylesheet" href="core/design-system.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg-0);color:var(--text);font-family:var(--font-ui);overflow:hidden;height:100vh;width:100vw}
canvas{display:block;position:absolute;top:0;left:0}

#phase-drift,#phase-snap,#phase-title,#phase-hub,#enter-btn,#tour-btn{position:absolute;z-index:10;opacity:0;transition:opacity 1.2s ease;pointer-events:none}
#phase-title.visible,#phase-hub.visible{opacity:1;pointer-events:auto}

#title-main{
  top:42%;left:50%;transform:translate(-50%,-50%);
  text-align:center;width:100%;
}
#title-main h1{
  font-size:clamp(28px,5vw,72px);font-weight:200;letter-spacing:.4em;
  color:var(--text);line-height:1.3;
}
#title-main h2{
  font-size:clamp(14px,2vw,22px);font-weight:400;letter-spacing:.15em;
  color:var(--text-dim);margin-top:12px;
}
#title-main h2 em{font-style:normal;color:var(--lattice)}

#phase-hub{
  bottom:18%;left:50%;transform:translateX(-50%);
  display:flex;gap:16px;
}
#enter-btn,#tour-btn{
  pointer-events:auto;cursor:pointer;
  padding:14px 32px;border-radius:12px;font-size:15px;
  font-family:var(--font-ui);font-weight:600;letter-spacing:1px;
  transition:all .3s var(--ease-snap);
  border:1px solid;
}
#enter-btn{
  background:rgba(0,212,255,0.08);border-color:rgba(0,212,255,0.3);color:var(--lattice);
}
#enter-btn:hover{background:rgba(0,212,255,0.18);border-color:var(--lattice);box-shadow:0 0 40px rgba(0,212,255,0.2);transform:scale(1.04)}
#tour-btn{
  background:rgba(124,92,252,0.08);border-color:rgba(124,92,252,0.3);color:var(--memory);
}
#tour-btn:hover{background:rgba(124,92,252,0.18);border-color:var(--memory);box-shadow:0 0 40px rgba(124,92,252,0.2);transform:scale(1.04)}

#demo-nodes{
  position:absolute;z-index:10;opacity:0;transition:opacity 1.5s ease;
  top:0;left:0;width:100%;height:100%;pointer-events:none;
}
#demo-nodes.visible{opacity:1;pointer-events:auto}

.demo-orb{
  position:absolute;width:64px;height:64px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;cursor:pointer;transition:all .3s var(--ease-snap);
  border:2px solid;background:rgba(6,6,15,0.6);
  backdrop-filter:blur(8px);
}
.demo-orb:hover{
  transform:scale(1.4);
  box-shadow:0 0 30px currentColor;
}
.demo-orb .orb-label{
  position:absolute;bottom:-22px;font-size:10px;white-space:nowrap;
  color:#888;letter-spacing:1px;text-transform:uppercase;
}

#skip{
  position:absolute;bottom:20px;right:20px;z-index:20;
  background:none;border:none;color:#333;font-size:12px;
  cursor:pointer;font-family:var(--font-ui);
}
#skip:hover{color:#666}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="title-main" style="opacity:0;transition:opacity 1.5s ease">
  <h1>FLOATING POINT<br>IS BROKEN</h1>
  <h2>Eisenstein integers fix <em>everything</em>.</h2>
</div>

<div id="phase-hub">
  <button id="enter-btn" style="opacity:0;transition:opacity 1s ease .3s">Enter the Universe</button>
  <button id="tour-btn" style="opacity:0;transition:opacity 1s ease .6s">Guided Tour — 8 min</button>
</div>

<div id="demo-nodes"></div>
<button id="skip">Skip ▸</button>

<script type="module">
import { SQ3, e12_to_pixel, SECTOR_COLORS } from './core/eisenstein.js';
import { resumeAudio, playSnap, startDrone } from './core/audio.js';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize();
addEventListener('resize', resize);

// === Timeline — LEAD WITH THE CRASH, not the lattice ===
const T = {
  crash_start: 0,         // IMMEDIATE: show the arm crash
  crash_loop: 3000,       // loop the crash for 3 seconds
  lattice_start: 3000,    // THEN bloom the lattice
  lattice_fill: 5000,
  points_appear: 5200,
  drift_start: 6000,
  snap_start: 8000,
  title_appear: 9000,
  subtitle_appear: 9700,
  buttons_appear: 10500,
  nodes_appear: 11000,
  interactive: 11500,
};

// === Lattice ===
const SCALE = 50;
let latticePoints = [];
let driftPoints = [];
let snappedPoints = new Set();

function buildLattice() {
  latticePoints = [];
  const cols = Math.ceil(W / SCALE) + 4;
  const rows = Math.ceil(H / (SCALE * SQ3 / 2)) + 4;
  for (let a = -cols; a < cols; a++) {
    for (let b = -rows; b < rows; b++) {
      const { x, y } = e12_to_pixel(a, b, SCALE, W / 2, H / 2);
      if (x > -SCALE && x < W + SCALE && y > -SCALE && y < H + SCALE) {
        latticePoints.push({ x, y, a, b, phase: Math.random() * Math.PI * 2 });
      }
    }
  }
  // Pick ~80 drift points
  driftPoints = [];
  const shuffled = [...latticePoints].sort(() => Math.random() - 0.5);
  for (let i = 0; i < Math.min(80, shuffled.length); i++) {
    driftPoints.push({
      home: shuffled[i],
      ox: 0, oy: 0, // drift offset
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      snapped: false,
      snapTime: 0,
      driftSpeed: 0.2 + Math.random() * 0.4,
    });
  }
}
buildLattice();
addEventListener('resize', buildLattice);

// === Demo nodes ===
const DEMOS = [
  { icon: '⚡', label: 'Drift Race', url: 'constraint-demos/drift-race.html', color: '#f85149', pos: [0.15, 0.32] },
  { icon: '⬡', label: 'Hex Snap', url: 'constraint-demos/hex-snap-playground.html', color: '#00d4ff', pos: [0.32, 0.22] },
  { icon: '🔽', label: 'Funnel', url: 'constraint-demos/constraint-funnel.html', color: '#a855f7', pos: [0.50, 0.18] },
  { icon: '🦾', label: 'Safe Arm', url: 'simulators/safe-arm.html', color: '#3fb950', pos: [0.72, 0.28] },
  { icon: '⚙️', label: 'FLUX VM', url: 'simulators/flux-vm.html', color: '#58a6ff', pos: [0.85, 0.48] },
  { icon: '🌐', label: 'Fleet', url: 'simulators/fleet-topology.html', color: '#f59e0b', pos: [0.70, 0.72] },
  { icon: '🏛️', label: 'Palace', url: 'penrose-memory-palace/index.html', color: '#7c5cfc', pos: [0.28, 0.72] },
];

const nodesEl = document.getElementById('demo-nodes');
DEMOS.forEach(d => {
  const orb = document.createElement('div');
  orb.className = 'demo-orb';
  orb.style.borderColor = d.color + '60';
  orb.style.color = d.color;
  orb.style.left = (d.pos[0] * 100) + '%';
  orb.style.top = (d.pos[1] * 100) + '%';
  orb.style.transform = 'translate(-50%,-50%)';
  orb.innerHTML = `${d.icon}<span class="orb-label">${d.label}</span>`;
  orb.onclick = () => window.open(d.url, '_blank');
  nodesEl.appendChild(orb);
});

// === Animation ===
let startTime = null;
let interactive = false;
let drone = null;
let skipped = false;

function skipToInteractive() {
  if (skipped) return;
  skipped = true;
  interactive = true;
  startTime = performance.now() - T.interactive;
  document.getElementById('skip').style.opacity = '0';
}

document.getElementById('skip').onclick = skipToInteractive;
document.getElementById('enter-btn').onclick = () => window.open('simulators/index.html', '_blank');
document.getElementById('tour-btn').onclick = () => window.open('tour.html', '_blank');
document.getElementById('tour-btn').onclick = () => window.location.href = 'tour.html';

function animate(now) {
  if (!startTime) startTime = now;
  const elapsed = now - startTime;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#06060f';
  ctx.fillRect(0, 0, W, H);

  // === Phase 0: THE CRASH — visceral hook (0-3s) ===
  if (elapsed < T.crash_loop) {
    // Draw a simple robot arm crashing into an obstacle
    const baseX = W * 0.35, baseY = H * 0.55;
    const crashProgress = elapsed / T.crash_loop;
    const armAngle = -0.3 + crashProgress * 2.8; // swinging into obstacle
    const seg1 = 100, seg2 = 80, seg3 = 60;
    const a1 = armAngle * 0.4;
    const a2 = armAngle * 0.8;
    const a3 = armAngle;
    
    // Joint 1
    const j1x = baseX + Math.cos(a1 - Math.PI/2) * seg1;
    const j1y = baseY + Math.sin(a1 - Math.PI/2) * seg1;
    // Joint 2
    const j2x = j1x + Math.cos(a1 + a2 - Math.PI/2) * seg2;
    const j2y = j1y + Math.sin(a1 + a2 - Math.PI/2) * seg2;
    // End effector
    const eex = j2x + Math.cos(a1 + a2 + a3 - Math.PI/2) * seg3;
    const eey = j2y + Math.sin(a1 + a2 + a3 - Math.PI/2) * seg3;
    
    // Obstacle
    const obsX = baseX + 60, obsY = baseY - 160;
    const hitDist = Math.hypot(eex - obsX, eey - obsY);
    const hit = hitDist < 45;
    
    // Obstacle glow
    ctx.beginPath();
    ctx.arc(obsX, obsY, 40 + (hit ? 15 * Math.sin(now * 0.02) : 0), 0, Math.PI * 2);
    ctx.fillStyle = hit ? 'rgba(248,81,73,0.15)' : 'rgba(248,81,73,0.06)';
    ctx.fill();
    ctx.beginPath(); ctx.arc(obsX, obsY, 35, 0, Math.PI * 2);
    ctx.strokeStyle = '#f8514960'; ctx.lineWidth = 2; ctx.stroke();
    ctx.font = '12px system-ui'; ctx.fillStyle = '#f8514988'; ctx.textAlign = 'center';
    ctx.fillText('OBSTACLE', obsX, obsY + 50);
    
    // Arm segments (red = unsafe)
    ctx.lineWidth = 6; ctx.lineCap = 'round';
    ctx.strokeStyle = '#f85149';
    ctx.beginPath(); ctx.moveTo(baseX, baseY); ctx.lineTo(j1x, j1y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(j1x, j1y); ctx.lineTo(j2x, j2y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(j2x, j2y); ctx.lineTo(eex, eey); ctx.stroke();
    
    // Joints
    [{ x: baseX, y: baseY }, { x: j1x, y: j1y }, { x: j2x, y: j2y }].forEach(j => {
      ctx.beginPath(); ctx.arc(j.x, j.y, 6, 0, Math.PI * 2);
      ctx.fillStyle = '#1a1a2e'; ctx.fill();
      ctx.strokeStyle = '#f85149'; ctx.lineWidth = 2; ctx.stroke();
    });
    
    // End effector
    ctx.beginPath(); ctx.arc(eex, eey, 5, 0, Math.PI * 2);
    ctx.fillStyle = hit ? '#f85149' : '#ff9999'; ctx.fill();
    
    // Impact flash
    if (hit) {
      ctx.beginPath(); ctx.arc(eex, eey, 20 + Math.random() * 10, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(248,81,73,0.3)'; ctx.fill();
      ctx.font = 'bold 18px system-ui'; ctx.fillStyle = '#f85149'; ctx.textAlign = 'center';
      ctx.fillText('CRASH', eex, eey - 30);
    }
    
    // Label
    ctx.font = '13px system-ui'; ctx.fillStyle = '#f8514988'; ctx.textAlign = 'left';
    ctx.fillText('UNSAFE — Float32', baseX - 20, baseY + 30);
    
    // Counter showing drift growing
    ctx.font = '28px "SF Mono", monospace'; ctx.fillStyle = '#f85149'; ctx.textAlign = 'right';
    ctx.fillText((crashProgress * 47.3).toFixed(1) + 'mm drift', W * 0.75, H * 0.4);
    ctx.font = '11px system-ui'; ctx.fillStyle = '#f8514966';
    ctx.fillText('accumulated rounding error', W * 0.75, H * 0.4 + 22);
    
    requestAnimationFrame(animate);
    return;
  }

  // === Phase 1: Lattice bloom ===
  const latticeProgress = Math.min(1, Math.max(0, (elapsed - T.lattice_start) / (T.lattice_fill - T.lattice_start)));
  const latticeRadius = latticeProgress * Math.max(W, H) * 0.8;

  // Draw lattice points
  for (const p of latticePoints) {
    const dist = Math.hypot(p.x - W / 2, p.y - H / 2);
    if (dist > latticeRadius) continue;
    const fadeIn = Math.min(1, (latticeRadius - dist) / 100);
    const pulse = 0.4 + 0.3 * Math.sin(now * 0.002 + p.phase);
    ctx.beginPath();
    ctx.arc(p.x, p.y, 1.5 * pulse, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(100,120,200,${0.12 * fadeIn * pulse})`;
    ctx.fill();
  }

  // Phase 2: Drift points appear and drift
  if (elapsed > T.points_appear) {
    const driftElapsed = elapsed - T.drift_start;
    
    for (let i = 0; i < driftPoints.length; i++) {
      const dp = driftPoints[i];
      
      // Snap phase
      if (elapsed > T.snap_start && !dp.snapped) {
        const snapDelay = T.snap_start + i * 20 + Math.random() * 200;
        if (elapsed > snapDelay) {
          dp.snapped = true;
          dp.snapTime = now;
          if (i % 3 === 0) playSnap(Math.floor(Math.random() * 6), 0.1);
        }
      }
      
      if (dp.snapped) {
        // Animate back to home
        const snapAge = (now - dp.snapTime) / 500;
        const t = Math.min(1, snapAge);
        const ease = 1 - Math.pow(1 - t, 3);
        dp.ox *= (1 - ease * 0.15);
        dp.oy *= (1 - ease * 0.15);
      } else if (driftElapsed > 0) {
        // Drift outward
        dp.ox += dp.vx * dp.driftSpeed;
        dp.oy += dp.vy * dp.driftSpeed;
        // Slow acceleration
        dp.vx *= 1.001;
        dp.vy *= 1.001;
      }

      const px = dp.home.x + dp.ox;
      const py = dp.home.y + dp.oy;

      if (dp.snapped) {
        // Cyan snap point
        const snapAge = (now - dp.snapTime);
        const glow = Math.max(0, 1 - snapAge / 1000);
        ctx.beginPath();
        ctx.arc(px, py, 3 + glow * 6, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0,212,255,${0.3 + glow * 0.5})`;
        ctx.fill();
        if (glow > 0.1) {
          ctx.beginPath();
          ctx.arc(px, py, 8 + glow * 15, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(0,212,255,${glow * 0.15})`;
          ctx.fill();
        }
      } else {
        // Red drifting point
        ctx.beginPath();
        ctx.arc(px, py, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(248,81,73,0.5)';
        ctx.fill();
        // Trail
        ctx.beginPath();
        ctx.moveTo(dp.home.x, dp.home.y);
        ctx.lineTo(px, py);
        ctx.strokeStyle = 'rgba(248,81,73,0.15)';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }
  }

  // Phase 3: Title
  const titleEl = document.getElementById('title-main');
  const hubEl = document.getElementById('phase-hub');
  const nodesCont = document.getElementById('demo-nodes');
  const enterBtn = document.getElementById('enter-btn');
  const tourBtn = document.getElementById('tour-btn');

  if (elapsed > T.title_appear) {
    titleEl.style.opacity = '1';
  }
  if (elapsed > T.buttons_appear) {
    hubEl.style.opacity = '1';
    hubEl.classList.add('visible');
    enterBtn.style.opacity = '1';
    tourBtn.style.opacity = '1';
  }
  if (elapsed > T.nodes_appear) {
    nodesCont.style.opacity = '1';
    nodesCont.classList.add('visible');
  }
  if (elapsed > T.interactive && !interactive) {
    interactive = true;
    document.getElementById('skip').style.opacity = '0';
  }

  requestAnimationFrame(animate);
}

// Start audio on first click
document.addEventListener('click', () => {
  resumeAudio();
  drone = startDrone();
}, { once: true });

requestAnimationFrame(animate);
</script>
</body>
</html>
