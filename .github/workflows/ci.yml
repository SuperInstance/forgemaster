```yaml
name: FLUX CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  rust:
    name: Rust Lint, Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust 1.75 Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.75"
          components: clippy, rustfmt
      - name: Build Rust Packages
        run: cargo build --all
      - name: Run Rust Tests
        run: cargo test --all
      - name: Run Clippy Lints
        run: cargo clippy --all -- -D warnings
      - name: Check Code Formatting
        run: cargo fmt --all --check

  python:
    name: Python Constraint Theory Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e ./constraint-theory
      - name: Execute Pytest Suite
        run: pytest ./constraint-theory/tests/ -v

  cuda:
    name: CUDA Kernel Compilation
    runs-on: [self-hosted, GPU]
    steps:
      - uses: actions/checkout@v4
      - name: Verify NVCC Installation
        run: nvcc --version
      - name: Build CUDA Kernels
        run: nvcc -arch=sm_75 -std=c++17 ./cuda/kernels.cu -o ./cuda/kernels.so
        # Adjust arch flag to match your target GPU architecture

  coq:
    name: Coq Proof Checking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Coq 8.18
        uses: coq-community/setup-coq@v1
        with:
          coq-version: "8.18.0"
      - name: Check All Coq Proof Files
        run: find ./coq-proofs -name "*.v" -exec coqc {} +
      # For projects with _CoqProject, use this optimized build flow:
      # - name: Build Coq Project
      #   run: coq_makefile -f _CoqProject && make -j$(nproc)
```

