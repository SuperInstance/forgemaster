version: "3.8"

services:
  flux-verifier:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: flux-safety:latest
    container_name: flux-verifier
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
      - seccomp:./flux-seccomp.json
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    user: "65534:65534"
    ports:
      - "9100:9100"
      - "50051:50051"
    volumes:
      - flux-data:/data
      - ./config.toml:/etc/flux/config.toml:ro
      - /tmp:/tmp
    environment:
      - FLUX_DB_PATH=/data/constraints.db
      - RUST_LOG=info
    networks:
      - flux-net
    healthcheck:
      test: ["CMD", "/usr/local/bin/flux-safety", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: flux-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - flux-net

  grafana:
    image: grafana/grafana:10.4.1
    container_name: flux-grafana
    restart: unless-stopped
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - flux-net

volumes:
  flux-data:
  prometheus-data:
  grafana-data:

networks:
  flux-net:
    driver: bridge
